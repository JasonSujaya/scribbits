<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">Scribbits</title>
  </head>
  <body class="app">
    <!-- Sketchbook page. Everything is static + intrinsically sized so it renders
         in Reddit's inline feed embed with NO JS and NO viewport-height collapse. -->
    <div class="page">
      <div class="tape tape-l"></div>
      <div class="tape tape-r"></div>

      <div class="logo-row">
        <h1 class="logo">
          <img
            class="logo-image"
            src="./assets/scribbits-logo.png"
            alt="Scribbits"
          />
        </h1>
      </div>

      <p class="tagline">
        <strong data-i18n="splash.tagline">
          Draw a Scribbit. Watch it fight.
        </strong>
      </p>

      <section class="battle-proof" aria-labelledby="battle-proof-title">
        <div class="battle-proof-frame">
          <div
            class="battle-stage"
            id="battle-poster"
            role="img"
            aria-label="Two hand-drawn Scribbits facing off in the arena"
          >
            <span class="battle-health battle-health-left"></span>
            <span class="battle-health battle-health-right"></span>
            <img
              class="battle-fighter battle-fighter-left"
              src="./assets/splash-doodle-mossmop.png"
              alt=""
            />
            <strong class="battle-versus">VS</strong>
            <img
              class="battle-fighter battle-fighter-right"
              src="./assets/splash-doodle-stormpuff.png"
              alt=""
            />
          </div>
          <video
            class="shared-battle-video"
            id="shared-battle-video"
            muted
            loop
            playsinline
            controls
            preload="metadata"
            hidden
          ></video>
          <span
            class="battle-proof-stamp"
            id="battle-proof-stamp"
            data-i18n="splash.battle.real"
          >
            REAL BATTLE
          </span>
        </div>
        <div class="battle-proof-copy">
          <strong id="battle-proof-title" data-i18n="splash.battle.title">
            DRAW → FIGHT → GROW
          </strong>
          <span data-i18n="splash.battle.detail">
            Your drawing becomes the fighter.
          </span>
        </div>
      </section>

      <section
        class="scribbit-showcase"
        id="today-status"
        aria-labelledby="showcase-label"
      >
        <span
          class="showcase-label"
          id="showcase-label"
          data-i18n="splash.showcase.sketchbook"
        >
          FROM OUR SKETCHBOOK
        </span>
        <div class="showcase-grid">
          <article
            class="showcase-card"
            data-showcase-slot
            data-fallback-name="Mossmop"
            data-fallback-artist="Scribbits"
          >
            <img
              class="showcase-image"
              src="./assets/splash-doodle-mossmop.png"
              alt="Mossmop, drawn in Scribbits"
              decoding="async"
            />
            <strong class="showcase-name">MOSSMOP</strong>
            <span class="showcase-artist">BY SCRIBBITS</span>
          </article>
          <article
            class="showcase-card"
            data-showcase-slot
            data-fallback-name="Looplet"
            data-fallback-artist="Scribbits"
          >
            <img
              class="showcase-image"
              src="./assets/splash-doodle-looplet.png"
              alt="Looplet, drawn in Scribbits"
              decoding="async"
            />
            <strong class="showcase-name">LOOPLET</strong>
            <span class="showcase-artist">BY SCRIBBITS</span>
          </article>
          <article
            class="showcase-card"
            data-showcase-slot
            data-fallback-name="Stormpuff"
            data-fallback-artist="Scribbits"
          >
            <img
              class="showcase-image"
              src="./assets/splash-doodle-stormpuff.png"
              alt="Stormpuff, drawn in Scribbits"
              decoding="async"
            />
            <strong class="showcase-name">STORMPUFF</strong>
            <span class="showcase-artist">BY SCRIBBITS</span>
          </article>
        </div>
      </section>

      <button
        class="start-button"
        id="start-button"
        type="button"
        data-i18n="splash.action.enterArena"
      >
        ENTER ARENA
      </button>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
