<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">Scribbits</title>
  </head>
  <body class="app">
    <!-- Static fallback markup keeps the Reddit inline card useful before JS. -->
    <main class="page">
      <div class="tape tape-left" aria-hidden="true"></div>
      <div class="tape tape-right" aria-hidden="true"></div>

      <header class="splash-header">
        <h1 class="logo">
          <img
            class="logo-image"
            src="./assets/scribbits-logo.webp"
            alt="Scribbits"
          />
        </h1>
        <p class="tagline" data-i18n="splash.tagline">
          Draw a Scribbit. Watch it fight.
        </p>
      </header>

      <section class="creation-story" aria-label="Draw, then battle">
        <article class="story-panel draw-panel">
          <div class="step-heading">
            <span class="step-number">1</span>
            <strong data-i18n="splash.story.draw">DRAW IT</strong>
          </div>
          <div class="creation-card">
            <span
              class="creation-source"
              id="creation-source"
              data-i18n="splash.showcase.sketchbook"
            >
              FROM OUR SKETCHBOOK
            </span>
            <img
              class="hero-creation-image"
              id="hero-creation-image"
              src="./assets/splash-doodle-mossmop.webp"
              alt="Mossmop, drawn in Scribbits"
              decoding="async"
            />
            <strong class="creation-name" id="hero-creation-name">
              MOSSMOP
            </strong>
            <span class="creation-artist" id="hero-creation-artist">
              BY SCRIBBITS
            </span>
          </div>
        </article>

        <div class="story-arrow" aria-hidden="true">
          <span data-i18n="splash.story.becomes">BECOMES</span>
          <strong>&rarr;</strong>
        </div>

        <article class="story-panel battle-panel">
          <div class="step-heading">
            <span class="step-number">2</span>
            <strong data-i18n="splash.story.battle">BATTLE</strong>
          </div>
          <div class="battle-frame">
            <div
              class="battle-stage"
              id="battle-poster"
              role="img"
              aria-label="Two hand-drawn Scribbits facing off in the arena"
            >
              <span class="battle-health battle-health-left"></span>
              <span class="battle-health battle-health-right"></span>
              <img
                class="battle-fighter battle-fighter-left"
                id="battle-hero-image"
                src="./assets/splash-doodle-mossmop.webp"
                alt=""
              />
              <strong class="battle-versus">VS</strong>
              <img
                class="battle-fighter battle-fighter-right"
                id="battle-rival-image"
                src="./assets/splash-doodle-stormpuff.webp"
                alt=""
              />
            </div>
            <video
              class="shared-battle-video"
              id="shared-battle-video"
              muted
              loop
              playsinline
              controls
              preload="metadata"
              hidden
            ></video>
            <span
              class="battle-proof-stamp"
              id="battle-proof-stamp"
              data-i18n="splash.battle.real"
            >
              REAL BATTLE
            </span>
          </div>
          <p class="battle-caption" data-i18n="splash.battle.detail">
            Your drawing becomes the fighter.
          </p>
        </article>
      </section>

      <footer class="splash-footer">
        <span class="matchup-note" data-i18n="splash.story.matchup">
          A fresh matchup every visit.
        </span>
        <button
          class="start-button"
          id="start-button"
          type="button"
          data-i18n="splash.action.enterArena"
        >
          ENTER ARENA
        </button>
      </footer>
    </main>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
