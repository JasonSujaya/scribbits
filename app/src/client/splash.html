<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">Scribbits</title>
  </head>
  <body class="app">
    <!-- A complete static-first hook keeps the feed card useful before JS. -->
    <main class="page">
      <span class="tape tape-left" aria-hidden="true"></span>
      <span class="tape tape-right" aria-hidden="true"></span>

      <header class="splash-header">
        <h1 class="logo">
          <img
            class="logo-image"
            src="./assets/scribbits-logo.webp"
            alt="Scribbits"
          />
        </h1>
        <span class="game-type" data-i18n="splash.invite.gameType">
          A REDDIT DRAWING GAME
        </span>
      </header>

      <section class="creation-card" aria-labelledby="creation-label">
        <span
          class="creation-label"
          id="creation-label"
          data-i18n="splash.showcase.sketchbook"
        >
          FROM OUR SKETCHBOOK
        </span>
        <div class="creation-stage">
          <div class="creation-poster" id="creation-poster">
            <span class="doodle-spark doodle-spark-left" aria-hidden="true"
              >✦</span
            >
            <span class="doodle-spark doodle-spark-right" aria-hidden="true"
              >✦</span
            >
            <figure class="featured-creation">
              <img
                id="featured-creation-image"
                src="./assets/splash-doodle-mossmop.webp"
                alt="Mossmop, drawn in Scribbits"
                decoding="async"
              />
              <figcaption>
                <strong id="featured-creation-name">MOSSMOP</strong>
                <span id="featured-creation-credit">BY SCRIBBITS</span>
              </figcaption>
            </figure>
          </div>
          <video
            class="shared-battle-video"
            id="shared-battle-video"
            muted
            loop
            playsinline
            controls
            preload="metadata"
            hidden
          ></video>
        </div>
      </section>

      <section class="invite-copy" aria-labelledby="invite-title">
        <p data-i18n="splash.invite.promise">DRAW IT. IT FIGHTS FOR YOU.</p>
        <h2 id="invite-title" data-i18n="splash.invite.hook">
          EVERYONE’S DRAWING LITTLE GUYS. YOURS IS MISSING.
        </h2>
      </section>

      <footer class="splash-footer">
        <button
          class="start-button"
          id="start-button"
          type="button"
          data-i18n="splash.action.drawYours"
        >
          DRAW YOURS
        </button>
        <p class="fresh-note" data-i18n="splash.invite.fresh">
          A FRESH ONE EVERY TIME YOU LOOK.
        </p>
      </footer>
    </main>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
