<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app.name">Scribbits</title>
  </head>
  <body class="app">
    <!-- A complete static-first hook keeps the feed card useful before JS. -->
    <main class="page">
      <span class="tape tape-left" aria-hidden="true"></span>
      <span class="tape tape-right" aria-hidden="true"></span>

      <header class="splash-header">
        <h1 class="logo">
          <img
            class="logo-image"
            src="./assets/scribbits-logo.webp"
            alt="Scribbits"
          />
        </h1>
        <span class="hook-stamp" data-i18n="splash.hook.drawnByYou">
          DRAWN BY YOU
        </span>
      </header>

      <section class="hook-copy" aria-labelledby="hook-title">
        <p data-i18n="splash.hook.doodle">YOUR DOODLE.</p>
        <h2 id="hook-title" data-i18n="splash.hook.fighter">YOUR FIGHTER.</h2>
      </section>

      <section class="battle-card" aria-label="A hand-drawn Scribbits battle">
        <span
          class="battle-kicker"
          id="battle-proof-stamp"
          data-i18n="splash.hook.shapeStats"
        >
          SHAPE BECOMES STATS
        </span>
        <div class="battle-stage">
          <div class="battle-poster" id="battle-poster">
            <span class="battle-health battle-health-left"></span>
            <span class="battle-health battle-health-right"></span>
            <figure class="fighter fighter-left">
              <img
                id="battle-hero-image"
                src="./assets/splash-doodle-mossmop.webp"
                alt="Mossmop, drawn in Scribbits"
                decoding="async"
              />
              <figcaption id="hero-creation-name">MOSSMOP</figcaption>
            </figure>
            <strong class="battle-versus">VS</strong>
            <figure class="fighter fighter-right">
              <img
                id="battle-rival-image"
                src="./assets/splash-doodle-stormpuff.webp"
                alt="Stormpuff, drawn in Scribbits"
                decoding="async"
              />
              <figcaption id="rival-creation-name">STORMPUFF</figcaption>
            </figure>
          </div>
          <video
            class="shared-battle-video"
            id="shared-battle-video"
            muted
            loop
            playsinline
            controls
            preload="metadata"
            hidden
          ></video>
        </div>
      </section>

      <footer class="splash-footer">
        <p class="proof-line" data-i18n="splash.tagline">
          <span aria-hidden="true">✦</span> DRAW IT. WATCH IT FIGHT.
        </p>
        <button
          class="start-button"
          id="start-button"
          type="button"
          data-i18n="splash.action.enterArena"
        >
          ENTER ARENA
        </button>
      </footer>
    </main>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
