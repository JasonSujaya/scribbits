<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Scribbits</title>
  </head>
  <body class="app">
    <!-- Sketchbook page. Everything is static + intrinsically sized so it renders
         in Reddit's inline feed embed with NO JS and NO viewport-height collapse. -->
    <div class="page">
      <div class="tape tape-l"></div>
      <div class="tape tape-r"></div>

      <div class="logo-row">
        <span class="doodle">✎</span>
        <h1 class="logo">SCRIBBITS</h1>
      </div>
      <p class="sub">ARENA</p>

      <p class="tagline">
        Draw a creature. <strong>Its shape becomes its stats.</strong><br />
        Tonight it fights. Three days to become a Legend.
      </p>

      <div class="forecast" id="forecast-line">
        <span class="fc-emoji">⛅</span>
        <span class="fc-text">Tonight's forecast is brewing…</span>
      </div>

      <p class="today-status" id="today-status" role="status" aria-live="polite">
        One drawing. One pick. Results tonight.
      </p>

      <button class="start-button" id="start-button" type="button">
        ✏️ DRAW TODAY'S SCRIBBIT
      </button>

      <p class="footnote">draw · back a contender · return for the rumble</p>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
