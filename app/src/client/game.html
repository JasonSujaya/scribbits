<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="stylesheet" href="game.css" />
    <title data-i18n="app.name">Scribbits</title>
  </head>

  <body>
    <div id="app">
      <div
        class="game-boot-status"
        id="game-boot-status"
        data-phase="loading"
        role="status"
        aria-live="polite"
      >
        <img src="./assets/scribbits-logo.png" alt="Scribbits" />
        <strong>OPENING SCRIBBITS…</strong>
        <span id="game-boot-message">Pinning up the arena.</span>
      </div>
      <div id="game-container"></div>
      <div class="rotate-prompt" role="status">
        <strong data-i18n="shell.rotate.title">Turn your phone upright</strong>
        <small data-i18n="shell.rotate.detail">
          Scribbits draws and fights best in portrait.
        </small>
      </div>
    </div>
    <script type="module" src="lib/gameboot.ts"></script>
    <script type="module" src="game.ts"></script>
  </body>
</html>
