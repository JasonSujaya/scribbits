<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="stylesheet" href="game.css" />
    <title data-i18n="app.name">Scribbits</title>
  </head>

  <body>
    <div id="app" aria-busy="true">
      <div class="game-boot-status" id="game-boot-status" data-phase="loading">
        <div class="game-boot-card">
          <span class="game-boot-tape" aria-hidden="true"></span>
          <img
            class="game-boot-logo"
            src="./assets/scribbits-logo.webp"
            alt=""
          />
          <div class="game-boot-doodles" aria-hidden="true">
            <img src="./assets/splash-doodle-mossmop.png" alt="" />
            <img src="./assets/splash-doodle-looplet.png" alt="" />
            <img src="./assets/splash-doodle-stormpuff.png" alt="" />
          </div>
          <p class="game-boot-tagline" data-i18n="preloader.tagline">
            Draw it. Its shape becomes its stats.
          </p>
          <span class="game-boot-version" id="game-boot-version">
            VERSION LOCAL
          </span>
          <div class="game-boot-progress-row">
            <div
              class="game-boot-progress"
              id="game-boot-progress"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              data-i18n-attr="aria-label:preloader.progressLabel"
            >
              <span class="game-boot-progress-fill"></span>
            </div>
            <span
              class="game-boot-percent"
              id="game-boot-percent"
              aria-hidden="true"
              >0%</span
            >
          </div>
          <strong
            class="game-boot-message"
            id="game-boot-message"
            role="status"
            aria-live="polite"
            data-i18n="preloader.preparing"
          >
            Preparing pages and artwork…
          </strong>
          <div class="game-boot-tip">
            <span data-i18n="preloader.tipLabel">SCRIBBIT TIP</span>
            <p id="game-boot-tip" data-i18n="preloader.tipShape">
              Your drawing’s shape decides how it fights.
            </p>
          </div>
          <button
            class="game-boot-start"
            id="game-boot-start"
            type="button"
            data-i18n="preloader.start"
            hidden
          >
            ENTER HOME
          </button>
          <button
            class="game-boot-retry"
            id="game-boot-retry"
            type="button"
            data-i18n="preloader.retry"
            hidden
          >
            TRY AGAIN
          </button>
        </div>
      </div>
      <div id="game-container"></div>
      <div
        class="scene-transition-status"
        id="scene-transition-status"
        data-stage="idle"
        role="status"
        aria-live="polite"
        hidden
      >
        <div class="scene-transition-card">
          <img src="./assets/scribbits-logo.webp" alt="" />
          <span class="scene-transition-spinner" aria-hidden="true"></span>
          <strong id="scene-transition-message">Opening page…</strong>
          <button id="scene-transition-retry" type="button" hidden>
            TRY AGAIN
          </button>
        </div>
      </div>
      <div class="rotate-prompt" role="status">
        <strong data-i18n="shell.rotate.title">Turn your phone upright</strong>
        <small data-i18n="shell.rotate.detail">
          Scribbits draws and fights best in portrait.
        </small>
      </div>
    </div>
    <script type="module" src="lib/gameboot.ts"></script>
    <script type="module" src="game.ts"></script>
  </body>
</html>
