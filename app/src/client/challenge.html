<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="challenge.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draw Them All · Scribbits</title>
  </head>
  <body class="app">
    <main class="challenge-card" aria-labelledby="challenge-title">
      <span class="tape tape-left" aria-hidden="true"></span>
      <span class="tape tape-right" aria-hidden="true"></span>

      <header class="challenge-header">
        <img class="logo" src="./assets/scribbits-logo.webp" alt="Scribbits" />
        <div class="day-sticker">
          <span id="day-range">DAYS 13–15</span>
          <strong id="progress-label">0 / 5 DRAWN</strong>
        </div>
      </header>

      <section class="challenge-copy">
        <p>FIVE DARES. THREE DAYS.</p>
        <h1 id="challenge-title">DRAW THEM ALL</h1>
        <span id="challenge-rule">
          ONE OPENS NOW. FINISH IT TO UNLOCK THE NEXT.
        </span>
      </section>

      <aside id="announcement-strip" class="announcement-strip" hidden>
        <span class="announcement-pin" aria-hidden="true"></span>
        <span id="announcement-copy"></span>
      </aside>

      <ol class="dare-list" id="dare-list" aria-label="Five Doodle Dares">
        <li class="dare-card" data-state="open">
          <canvas width="96" height="96" aria-hidden="true"></canvas>
          <span class="dare-number">01</span>
          <strong>LOADING DARE…</strong>
          <span class="dare-state">OPEN</span>
        </li>
        <li class="dare-card" data-state="locked">
          <canvas width="96" height="96" aria-hidden="true"></canvas>
          <span class="dare-number">02</span>
          <strong>LOADING DARE…</strong>
          <span class="dare-state">LOCKED</span>
        </li>
        <li class="dare-card" data-state="locked">
          <canvas width="96" height="96" aria-hidden="true"></canvas>
          <span class="dare-number">03</span>
          <strong>LOADING DARE…</strong>
          <span class="dare-state">LOCKED</span>
        </li>
        <li class="dare-card" data-state="locked">
          <canvas width="96" height="96" aria-hidden="true"></canvas>
          <span class="dare-number">04</span>
          <strong>LOADING DARE…</strong>
          <span class="dare-state">LOCKED</span>
        </li>
        <li class="dare-card" data-state="locked">
          <canvas width="96" height="96" aria-hidden="true"></canvas>
          <span class="dare-number">05</span>
          <strong>LOADING DARE…</strong>
          <span class="dare-state">LOCKED</span>
        </li>
      </ol>

      <footer class="challenge-footer">
        <button id="draw-button" class="draw-button" type="button">
          START DARE 1
        </button>
        <p id="fresh-note">NEW DARES EVERY 3 DAYS.</p>
      </footer>
    </main>
    <script type="module" src="challenge.ts" defer></script>
  </body>
</html>
