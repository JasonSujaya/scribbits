name: Devvit Auto Deploy

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "scripts/**"
      - "deploy.command"
      - ".github/workflows/devvit-auto-deploy.yml"
  workflow_dispatch:

concurrency:
  group: devvit-auto-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.7.0"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Restore Devvit token
        env:
          DEVVIT_TOKEN_B64: ${{ secrets.DEVVIT_TOKEN_B64 }}
        run: |
          if [ -z "$DEVVIT_TOKEN_B64" ]; then
            echo "Missing repository secret DEVVIT_TOKEN_B64." >&2
            echo "Create it from your local ~/.devvit/token after running devvit login." >&2
            exit 1
          fi
          mkdir -p ~/.devvit
          printf "%s" "$DEVVIT_TOKEN_B64" | base64 --decode > ~/.devvit/token
          chmod 600 ~/.devvit/token

      - name: Verify and upload to Devvit
        working-directory: app
        run: pnpm run deploy
