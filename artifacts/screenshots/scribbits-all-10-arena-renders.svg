<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #2b2016; text-anchor: middle; }
